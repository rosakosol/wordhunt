<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Word Hunt</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Word Hunt</h1>
        <p class="tagline">Connect adjacent letters · Longer words score more</p>
      </header>

      <section class="setup" id="setup">
        <label class="field">
          <span class="field-label">Round length</span>
          <div class="duration-row">
            <input
              type="range"
              id="duration-slider"
              min="1"
              max="5"
              step="1"
              value="2"
              aria-valuetext="2 minutes"
            />
            <div class="duration-display">
              <input type="number" id="duration-input" min="1" max="5" value="2" />
              <span class="unit">min</span>
            </div>
          </div>
          <p class="hint">Drag the slider or type minutes (1–5).</p>
        </label>
        <button type="button" class="btn primary" id="btn-start">Start game</button>
        <p class="load-status" id="load-status" hidden>Loading dictionary…</p>
      </section>

      <section class="game" id="game" hidden>
        <div class="hud">
          <div class="hud-block">
            <span class="hud-label">Time</span>
            <span class="hud-value" id="timer">0:00</span>
          </div>
          <div class="hud-block">
            <span class="hud-label">Score</span>
            <span class="hud-value" id="score">0</span>
          </div>
          <div class="hud-block grow">
            <span class="hud-label">Word</span>
            <span class="hud-word" id="current-word">—</span>
          </div>
        </div>

        <div class="board-wrap">
          <div class="board-stack">
            <div class="board" id="board" role="application" aria-label="Letter grid"></div>
            <svg class="board-path" id="board-path" aria-hidden="true"></svg>
          </div>
        </div>

        <p class="help">Drag across touching letters (including diagonals). Release to submit. Drag back one step to undo.</p>

        <div class="found-panel">
          <h2>Found words <span class="count" id="found-count">0</span></h2>
          <ul class="found-list" id="found-list"></ul>
        </div>

        <button type="button" class="btn ghost" id="btn-end-early">End round</button>
      </section>

      <div class="modal" id="modal-end" hidden>
        <div class="modal-card">
          <h2>Round over</h2>
          <p class="modal-score">Score: <strong id="final-score">0</strong></p>
          <p class="modal-words">Words found: <strong id="final-words">0</strong></p>
          <ul class="modal-word-list" id="final-word-list"></ul>
          <button type="button" class="btn primary" id="btn-play-again">Play again</button>
        </div>
      </div>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
